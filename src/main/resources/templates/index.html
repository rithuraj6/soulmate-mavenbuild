<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Soulmate Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --rose: #e8a0b4;
            --rose-deep: #c4677e;
            --gold: #d4a96a;
            --gold-light: #f0d5a0;
            --ink: #1a0a12;
            --blush: #fdf0f4;
            --glass: rgba(255,255,255,0.07);
            --glass-border: rgba(255,255,255,0.15);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0008;
            font-family: 'Cormorant Garamond', Georgia, serif;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated nebula background ── */
        .bg-nebula {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 30%, rgba(180,40,90,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 70%, rgba(100,20,140,0.22) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(212,169,106,0.08) 0%, transparent 70%),
                #0d0008;
            animation: nebulaDrift 14s ease-in-out infinite alternate;
        }
        @keyframes nebulaDrift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            50%  { filter: hue-rotate(15deg) brightness(1.08); }
            100% { filter: hue-rotate(-10deg) brightness(0.95); }
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat linear infinite;
        }
        .orb-1 { width: 320px; height: 320px; background: rgba(200,80,120,0.18); top: -80px; left: -80px; animation-duration: 18s; }
        .orb-2 { width: 240px; height: 240px; background: rgba(130,60,180,0.22); bottom: -60px; right: -60px; animation-duration: 22s; animation-direction: reverse; }
        .orb-3 { width: 180px; height: 180px; background: rgba(212,169,106,0.15); top: 40%; left: 60%; animation-duration: 16s; }
        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(30px, -20px) scale(1.08); }
            66%  { transform: translate(-20px, 30px) scale(0.95); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ── Star field ── */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50%       { opacity: 0.9; transform: scale(1.4); }
        }

        /* ── Light flares ── */
        .flare {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
            animation: flareGlow ease-in-out infinite alternate;
        }
        .flare-1 {
            width: 6px; height: 6px;
            background: #fff;
            box-shadow: 0 0 12px 6px rgba(255,220,180,0.9), 0 0 40px 20px rgba(255,180,100,0.4), 0 0 80px 40px rgba(200,100,60,0.15);
            top: 22%; left: 15%;
            animation-duration: 4s;
        }
        .flare-2 {
            width: 4px; height: 4px;
            background: #fff;
            box-shadow: 0 0 10px 5px rgba(220,180,255,0.9), 0 0 30px 15px rgba(160,100,255,0.4), 0 0 60px 30px rgba(100,40,200,0.15);
            top: 68%; right: 18%;
            animation-duration: 5.5s;
            animation-delay: -2s;
        }
        .flare-3 {
            width: 3px; height: 3px;
            background: #fff;
            box-shadow: 0 0 8px 4px rgba(255,240,200,0.9), 0 0 25px 12px rgba(255,210,100,0.4);
            top: 40%; right: 30%;
            animation-duration: 3.2s;
            animation-delay: -1s;
        }
        @keyframes flareGlow {
            0%   { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1;   transform: scale(1.3); }
        }

        /* ── Lens streak on flare-1 ── */
        .flare-1::before, .flare-1::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(90deg, transparent, rgba(255,200,120,0.6), transparent);
            border-radius: 50%;
        }
        .flare-1::before { width: 120px; height: 2px; }
        .flare-1::after  { width: 2px; height: 80px; background: linear-gradient(180deg, transparent, rgba(255,200,120,0.4), transparent); }

        /* ── Card ── */
        .card-outer {
            position: relative;
            z-index: 10;
            padding: 3px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(212,169,106,0.6), rgba(200,80,120,0.3), rgba(130,60,180,0.5), rgba(212,169,106,0.4));
            animation: borderSpin 6s linear infinite;
            background-size: 300% 300%;
        }
        @keyframes borderSpin {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(15, 4, 10, 0.82);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 22px;
            padding: 56px 52px 52px;
            width: 420px;
            max-width: 95vw;
            position: relative;
            overflow: hidden;
        }

        /* inner shimmer sweep */
        .card::before {
            content: '';
            position: absolute;
            top: -100%;
            left: -60%;
            width: 60%;
            height: 300%;
            background: linear-gradient(105deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: shimmerSweep 5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes shimmerSweep {
            0%   { transform: translateX(-40%) skewX(-10deg); }
            100% { transform: translateX(360%) skewX(-10deg); }
        }

        /* top inner glow */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212,169,106,0.5), rgba(200,80,120,0.4), transparent);
        }

        /* ── Decorative symbol ── */
        .sigil {
            text-align: center;
            margin-bottom: 8px;
        }
        .sigil svg { width: 44px; height: 44px; filter: drop-shadow(0 0 12px rgba(212,169,106,0.7)); }

        /* ── Heading ── */
        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.45rem;
            font-weight: 400;
            color: transparent;
            background: linear-gradient(135deg, var(--gold-light), var(--rose), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            text-align: center;
            letter-spacing: 0.04em;
            line-height: 1.35;
            margin-bottom: 6px;
            animation: textShimmer 4s ease-in-out infinite alternate;
        }
        @keyframes textShimmer {
            0%   { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            font-style: italic;
            color: rgba(232,160,180,0.55);
            letter-spacing: 0.12em;
            margin-bottom: 40px;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .divider-line {
            flex: 1;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, rgba(212,169,106,0.4), transparent);
        }
        .divider-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px rgba(212,169,106,0.8);
        }

        /* ── Form fields ── */
        .field {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.78rem;
            font-weight: 300;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(212,169,106,0.75);
            margin-bottom: 9px;
            transition: color 0.3s;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 13px 18px;
            background: rgba(255,255,255,0.04);
            border: 0.5px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: rgba(255,240,248,0.9);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.35s, background 0.35s, box-shadow 0.35s;
            position: relative;
            z-index: 1;
        }
        input[type="text"]::placeholder,
        input[type="number"]::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: rgba(212,169,106,0.55);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(212,169,106,0.1), 0 0 20px rgba(212,169,106,0.08);
        }
        input[type="text"]:focus + .field-glow,
        input[type="number"]:focus + .field-glow { opacity: 1; }

        .field-glow {
            position: absolute;
            bottom: -4px; left: 10%; right: 10%;
            height: 12px;
            background: radial-gradient(ellipse, rgba(212,169,106,0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            filter: blur(4px);
        }

        /* ── Submit button ── */
        button[type="submit"] {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #9b3a5c, #c4677e, #7a3060, #9b3a5c);
            background-size: 250% 250%;
            color: rgba(255,240,248,0.95);
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.14em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.3s;
            animation: btnGradient 4s ease infinite;
            box-shadow: 0 4px 24px rgba(180,60,100,0.35), 0 0 0 0.5px rgba(255,255,255,0.1) inset;
        }
        @keyframes btnGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(180,60,100,0.55), 0 0 30px rgba(212,169,106,0.2);
        }
        button[type="submit"]:active { transform: translateY(0) scale(0.98); }

        /* button pulse ring */
        button[type="submit"]::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        button[type="submit"]:hover::before { background: rgba(255,255,255,0.06); }

        /* button shimmer */
        button[type="submit"]::after {
            content: '';
            position: absolute;
            top: 0; left: -80%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            transform: skewX(-20deg);
            animation: btnShimmer 3s ease-in-out infinite;
        }
        @keyframes btnShimmer {
            0%   { left: -80%; }
            100% { left: 160%; }
        }

        /* ── Floating particles ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleRise linear infinite;
        }
        @keyframes particleRise {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-110vh) translateX(var(--dx)) scale(0.3); opacity: 0; }
        }

        /* ── Card entrance ── */
        .card-outer {
            animation: borderSpin 6s linear infinite, cardIn 1.1s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Liquid ripple on submit ── */
        @keyframes ripple {
            0%   { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(4); opacity: 0; }
        }
        .ripple-el {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            pointer-events: none;
            animation: ripple 0.7s ease-out forwards;
            transform-origin: center;
        }
    </style>
</head>
<body>

<div class="bg-nebula"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="flare flare-1"></div>
<div class="flare flare-2"></div>
<div class="flare flare-3"></div>
<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<div class="card-outer">
    <div class="card">
        <!-- Sigil / icon -->
        <div class="sigil">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="22" cy="22" r="20" stroke="url(#sg)" stroke-width="0.8" opacity="0.6"/>
                <path d="M22 10 L24.5 18H33L26.5 23L29 31L22 26L15 31L17.5 23L11 18H19.5Z" fill="url(#sg2)" opacity="0.9"/>
                <defs>
                    <linearGradient id="sg" x1="2" y1="2" x2="42" y2="42" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#d4a96a"/>
                        <stop offset="1" stop-color="#e8a0b4"/>
                    </linearGradient>
                    <linearGradient id="sg2" x1="11" y1="10" x2="33" y2="31" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#f0d5a0"/>
                        <stop offset="1" stop-color="#e8a0b4"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <h1>Find Your Soulmate</h1>
        <p class="subtitle">the stars know who awaits you</p>

        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-dot"></span>
            <span class="divider-line"></span>
        </div>

        <!-- ✅ Original working form — untouched -->
        <form action="/result" method="post">
            <div class="field">
                <label>Name</label>
                <input type="text" name="name" placeholder="your name…">
                <div class="field-glow"></div>
            </div>

            <div class="field">
                <label>Age</label>
                <input type="number" name="age" placeholder="your age…">
                <div class="field-glow"></div>
            </div>

            <div class="field">
                <label>Location</label>
                <input type="text" name="location" placeholder="your city…">
                <div class="field-glow"></div>
            </div>

            <button type="submit">Reveal My Soulmate</button>
        </form>
    </div>
</div>

<script>
    /* Star field */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 1.8 + 0.4;
        s.style.cssText = `
            width:${size}px; height:${size}px;
            top:${Math.random()*100}%; left:${Math.random()*100}%;
            animation-duration:${(Math.random()*4+2).toFixed(1)}s;
            animation-delay:${(Math.random()*6).toFixed(1)}s;
        `;
        starsEl.appendChild(s);
    }

    /* Floating particles */
    const particlesEl = document.getElementById('particles');
    const pColors = ['rgba(212,169,106,', 'rgba(232,160,180,', 'rgba(200,160,255,', 'rgba(255,220,200,'];
    for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        const color = pColors[Math.floor(Math.random() * pColors.length)];
        const dx = (Math.random() - 0.5) * 120;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            background:${color}0.7);
            left:${Math.random()*100}%;
            top:${100 + Math.random()*20}%;
            --dx:${dx}px;
            animation-duration:${(Math.random()*12+8).toFixed(1)}s;
            animation-delay:-${(Math.random()*12).toFixed(1)}s;
            box-shadow:0 0 ${size*3}px ${size}px ${color}0.3);
        `;
        particlesEl.appendChild(p);
    }

    /* Liquid ripple on button click */
    document.querySelector('button[type="submit"]').addEventListener('click', function(e) {
        const btn = this;
        const rect = btn.getBoundingClientRect();
        const rip = document.createElement('span');
        rip.className = 'ripple-el';
        const x = e.clientX - rect.left - 30;
        const y = e.clientY - rect.top - 30;
        rip.style.cssText = `left:${x}px; top:${y}px;`;
        btn.appendChild(rip);
        rip.addEventListener('animationend', () => rip.remove());
    });

    /* Subtle parallax on mouse move */
    document.addEventListener('mousemove', e => {
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
        document.querySelector('.orb-1').style.transform = `translate(${dx*18}px, ${dy*14}px)`;
        document.querySelector('.orb-3').style.transform = `translate(${-dx*12}px, ${-dy*10}px)`;
        document.querySelectorAll('.flare').forEach((f, i) => {
            const depth = [0.5, 0.3, 0.7][i];
            f.style.transform = `translate(${dx*20*depth}px, ${dy*16*depth}px)`;
        });
    });
</script>
</body>
</html>
